name: Execute MySQL Script

on:
  push:
    branches: ["dev", "main"]
  workflow_dispatch:

jobs:
  mysql-experiment:
    runs-on: ubuntu-latest
    timeout-minutes: 360

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: rootpass
          MYSQL_DATABASE: mydb
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h 127.0.0.1 -uroot -prootpass"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install uv
        run: pip install uv

      - name: Install MySQL client
        run: |
          sudo apt-get update
          sudo apt-get install -y mysql-client

      - name: Wait for MySQL
        run: |
          for i in {1..30}; do
            if mysqladmin ping -h 127.0.0.1 -P 3306 -uroot -prootpass --silent; then
              echo "MySQL is ready"
              exit 0
            fi
            echo "Waiting for MySQL..."
            sleep 2
          done
          echo "MySQL did not become ready"
          exit 1

      - name: Install dependencies
        run: |
          uv venv
          uv sync
          uv pip install -e .

      - name: Execute script
        env:
          PYTHONUNBUFFERED: "1"
          PYTHONIOENCODING: "utf-8"
          MYSQL_CONNECTION_STRING: mysql+pymysql://root:rootpass@127.0.0.1:3306/mydb
        run: |
          source .venv/bin/activate
          
          # Updated to target your script folder.           
          python -u scripts/exp_mysql_disprover.py  \
            --data_fp data/mysql/leetcode.jsonlines \
            --connection_string "$MYSQL_CONNECTION_STRING" \
            --output_dir results \
            --workers 1

      - name: Upload results as artifact
        uses: actions/upload-artifact@v4
        with:
          name: mysql-experiment-results
          path: results/