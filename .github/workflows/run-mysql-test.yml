name: Execute MySQL Script

on:
  push:
    branches: ["dev", "main"]
  workflow_dispatch:

jobs:
  mysql-experiment:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    strategy:
      fail-fast: false
      matrix:
        start:
          - 0
          - 1000
          - 2000
          - 3000
          - 4000
          - 5000
          - 6000
          - 7000
          - 8000
          - 9000
          - 10000
          - 11000
          - 12000
          - 13000
          - 14000
          - 15000
          - 16000
          - 17000
          - 18000
          - 19000
          - 20000
          - 21000
          - 22000
          - 23000

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: rootpass
          MYSQL_DATABASE: mydb
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h 127.0.0.1 -uroot -prootpass"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install uv
        run: pip install uv

      - name: Install MySQL client
        run: |
          sudo apt-get update
          sudo apt-get install -y mysql-client

      - name: Wait for MySQL
        run: |
          for i in {1..30}; do
            if mysqladmin ping -h 127.0.0.1 -P 3306 -uroot -prootpass --silent; then
              echo "MySQL is ready"
              exit 0
            fi
            echo "Waiting for MySQL..."
            sleep 2
          done
          echo "MySQL did not become ready"
          exit 1

      - name: Install dependencies
        run: |
          uv venv
          uv sync
          uv pip install -e .

      - name: Execute script
        env:
          PYTHONUNBUFFERED: "1"
          PYTHONIOENCODING: "utf-8"
          MYSQL_CONNECTION_STRING: mysql+pymysql://root:rootpass@127.0.0.1:3306/mydb
        run: |
          source .venv/bin/activate

          python -u scripts/exp_mysql_disprover.py \
            --data_fp data/mysql/leetcode.jsonlines \
            --connection_string "$MYSQL_CONNECTION_STRING" \
            --output_dir results \
            --start "${{ matrix.start }}" \
            --limit 1000 \
            --workers 8 \
            --timeout 30

      - name: Publish metrics summary
        if: always()
        run: |
          latest_metrics="$(ls -t results/mysql_metrics_*.json 2>/dev/null | head -n 1 || true)"
          if [ -z "$latest_metrics" ]; then
            echo "No MySQL metrics file was produced." >> "$GITHUB_STEP_SUMMARY"
            exit 0
          fi

          echo "## MySQL experiment metrics" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo '```json' >> "$GITHUB_STEP_SUMMARY"
          cat "$latest_metrics" >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"

      - name: Upload results as artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: mysql-experiment-results-${{ matrix.start }}
          path: results/
          if-no-files-found: warn
