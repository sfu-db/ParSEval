name: Release to GitHub

run-name: Release ${{ github.ref_name }}

on:
  push:
    branches:
      - main
    tags: 
      - "v*"

permissions:
  contents: write

jobs:
  tag-and-release:
    name: Tag and Release
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get version from pyproject.toml
        id: version
        # If triggered by a manual tag, we skip reading pyproject.toml
        if: startsWith(github.ref, 'refs/heads/')
        run: echo "version=$(grep -m1 'version' pyproject.toml | cut -d'"' -f2)" >> $GITHUB_OUTPUT

      - name: Determine Tag
        id: tag_check
        run: |
          if [[ "${{ github.ref }}" == refs/tags/* ]]; then
            # If triggered by a manual tag push, use that tag
            echo "tag=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT
            echo "should_release=true" >> $GITHUB_OUTPUT
          else
            # If triggered by a push to main, create the tag
            TAG="v${{ steps.version.outputs.version }}"
            if ! git rev-parse "$TAG" >/dev/null 2>&1; then
              git tag "$TAG"
              git push origin "$TAG"
              echo "tag=$TAG" >> $GITHUB_OUTPUT
              echo "should_release=true" >> $GITHUB_OUTPUT
            else
              echo "Tag $TAG already exists. Skipping release."
              echo "should_release=false" >> $GITHUB_OUTPUT
            fi
          fi

      - name: Install uv
        if: steps.tag_check.outputs.should_release == 'true'
        uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true

      - name: Setup Python
        if: steps.tag_check.outputs.should_release == 'true'
        run: uv python install 3.10

      - name: Install dependencies
        if: steps.tag_check.outputs.should_release == 'true'
        run: uv sync --all-extras --dev

      - name: Build package
        if: steps.tag_check.outputs.should_release == 'true'
        run: uv build

      - name: Create GitHub Release
        if: steps.tag_check.outputs.should_release == 'true'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag_check.outputs.tag }}
          files: dist/*
          generate_release_notes: true