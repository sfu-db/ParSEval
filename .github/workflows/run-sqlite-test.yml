name: Run SQLite Experiment

on:
  push:
    branches: ["dev", "main"]
  workflow_dispatch:

jobs:
  sqlite-experiment:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install uv
        run: pip install uv

      - name: Install dependencies
        run: |
          uv venv
          uv sync
          uv pip install -e .

      - name: Run SQLite experiment
        env:
          PYTHONUNBUFFERED: "1"
          PYTHONIOENCODING: "utf-8"
        run: |
          source .venv/bin/activate
          python -u tests/experiment/test_sqlite.py \
            --schema_fp data/sqlite/schema.json \
            --gold_fp data/sqlite/dev.json \
            --preds_fp data/sqlite/dail.txt \
            --output_dir results \
            --workers 32

      - name: Upload results as artifact
        uses: actions/upload-artifact@v4
        with:
          name: sqlite-experiment-results
          path: results/
