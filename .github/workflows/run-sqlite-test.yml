name: Run SQLite test and save results

on:
  push:
    branches: ["main", "master", "dev"]
  pull_request:
  workflow_dispatch:

jobs:
  run-sqlite-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          persist-credentials: true

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt || true
          pip install -e ".[dev]" || pip install -e .

      - name: Run sqlite test script
        run: |
          python tests/experiment/test_sqlite.py \
            --schema_fp data/sqlite/schema.json \
            --gold_fp data/sqlite/dev.json \
            --preds_fp data/sqlite/dail.txt \
            --connection_string file:ci_sqlite.db \
            --output_dir results

      - name: Commit results
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add results/*.json || true
          git commit -m "Add sqlite test results [ci skip]" || echo "No changes to commit"
          git push
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
